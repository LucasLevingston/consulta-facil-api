spring.application.name=consulta-facil-api
spring.application.description=API para agendamento de consultas médicas

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/consulta_facil_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server
server.port=8080
server.servlet.context-path=/api/v1

# Logging
logging.level.root=INFO
logging.level.com.example.consulta=DEBUG
logging.level.org.springframework.security=DEBUG

# OpenAPI / Swagger
springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT
jwt.secret=your-secret-key-change-this-in-production-with-environment-variable
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
