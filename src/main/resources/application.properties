spring.application.name=consulta-facil-api
spring.application.description=API para agendamento de consultas médicas

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/consulta_facil_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false
# V7 checksum changed (DECIMAL → DOUBLE PRECISION); V8 applies the fix on existing DBs
spring.flyway.validate-on-migrate=false

# Server
server.port=8080
server.servlet.context-path=/v1

# Logging
logging.level.root=INFO
logging.level.com.example.consulta=DEBUG
logging.level.org.springframework.security=DEBUG

# OpenAPI / Swagger
springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT
jwt.secret=your-secret-key-change-this-in-production-with-environment-variable
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:3000

# Rate limiting
auth.rate-limit.login.requests-per-minute=5
auth.rate-limit.forgot-password.requests-per-15min=3

# Account lockout
auth.lockout.max-attempts=5
auth.lockout.duration-minutes=15

# Cache — Redis
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.connect-timeout=2000
spring.data.redis.timeout=2000

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.observations.key-values.application=${spring.application.name}
management.observations.key-values.environment=development

# Tracing (disabled in dev to avoid noise)
management.tracing.enabled=false

# AWS
aws.region=${AWS_REGION:us-east-1}
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket-name=${AWS_S3_BUCKET:consulta-facil-images}
aws.ses.from-email=${AWS_SES_FROM_EMAIL:noreply@consulta-facil.com}

# App URL (used in email links)
app.url=${APP_URL:http://localhost:3000}

# Multipart upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# MercadoPago
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:TEST-your-access-token-here}
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}

# Anthropic AI
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-haiku-4-5-20251001

# Twilio WhatsApp
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
mercadopago.success-url=${APP_URL:http://localhost:3000}/settings/billing/success
mercadopago.failure-url=${APP_URL:http://localhost:3000}/settings/billing/failure
mercadopago.pending-url=${APP_URL:http://localhost:3000}/settings/billing/pending


# RabbitMQ (CloudAMQP — set RABBITMQ_URL env var in production)
spring.rabbitmq.addresses=${RABBITMQ_URL:amqp://guest:guest@localhost:5672}
spring.rabbitmq.listener.simple.missing-queues-fatal=false

# Tax / Fiscal
billing.tax.regime=${TAX_REGIME:SIMPLES_NACIONAL}
billing.tax.simples.rate=${TAX_SIMPLES_RATE:6.0}
billing.tax.iss.rate=${TAX_ISS_RATE:2.9}
billing.tax.processing-fee.credit-card=${TAX_PROCESSING_FEE_CREDIT_CARD:4.98}
billing.tax.processing-fee.pix=${TAX_PROCESSING_FEE_PIX:0.99}
billing.tax.processing-fee.debit=${TAX_PROCESSING_FEE_DEBIT:1.99}
