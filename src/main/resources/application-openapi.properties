# Perfil para geração do OpenAPI spec sem PostgreSQL
# Usado pelo springdoc-openapi-gradle-plugin via: ./gradlew generateOpenApiDocs

spring.datasource.url=jdbc:h2:mem:openapi-gen;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Desativa Flyway no perfil de geração (DDL é gerido pelo Hibernate)
spring.flyway.enabled=false

# Desativa features que precisam de serviços externos
mercadopago.access-token=TEST-dummy
mercadopago.success-url=http://localhost:3000/billing/success
mercadopago.failure-url=http://localhost:3000/billing/failure
mercadopago.pending-url=http://localhost:3000/billing/pending

aws.region=us-east-1
aws.access-key=
aws.secret-key=
aws.s3.bucket-name=dummy-bucket

# Desativa docker-compose auto-configuration no bootRun forked do plugin
spring.docker.compose.enabled=false
