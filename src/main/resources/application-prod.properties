# --- Database (RDS via env vars) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Flyway: NUNCA limpar banco em producao
spring.flyway.clean-disabled=true

# --- Seguranca ---
# JWT sem fallback: falha no startup se nao definido
jwt.secret=${JWT_SECRET}

# --- CORS ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# --- MercadoPago ---
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.success-url=${APP_URL}/settings/billing/success
mercadopago.failure-url=${APP_URL}/settings/billing/failure
mercadopago.pending-url=${APP_URL}/settings/billing/pending

# --- Logging (reduzido em prod) ---
logging.level.root=WARN
logging.level.com.example.consulta=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# --- Swagger desabilitado em prod ---
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# --- Actuator: somente health exposto ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
