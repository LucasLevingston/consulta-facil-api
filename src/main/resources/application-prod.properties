# --- Database (RDS via env vars) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- HikariCP pool ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# Flyway: NUNCA limpar banco em producao
spring.flyway.clean-disabled=true
# V7 checksum changed (DECIMAL → DOUBLE PRECISION); skip validation so V8 can apply the fix
spring.flyway.validate-on-migrate=false
# Flyway runs as master (DDL); app runs as cfapp (DML only) — #31
spring.flyway.user=${FLYWAY_DB_USERNAME}
spring.flyway.password=${FLYWAY_DB_PASSWORD}
spring.flyway.locations=classpath:db/migration,classpath:db/migration-prod
# Inject cfapp password into V1000 SQL migration via Flyway placeholder
spring.flyway.placeholders.app_db_password=${DB_PASSWORD}

# --- Seguranca ---
# JWT sem fallback: falha no startup se nao definido
jwt.secret=${JWT_SECRET}

# --- CORS ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# --- MercadoPago ---
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.success-url=${APP_URL}/settings/billing/success
mercadopago.failure-url=${APP_URL}/settings/billing/failure
mercadopago.pending-url=${APP_URL}/settings/billing/pending

# --- Logging (reduzido em prod) ---
logging.level.root=WARN
logging.level.com.example.consulta=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# --- Swagger desabilitado em prod ---
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# --- Actuator ---
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.observations.key-values.application=${spring.application.name}
management.observations.key-values.environment=production

# --- Tracing (OTLP → Grafana Cloud Tempo) ---
# GRAFANA_OTLP_ENDPOINT and GRAFANA_OTLP_TOKEN are validated by ProdEnvironmentValidator
management.tracing.enabled=true
management.tracing.sampling.probability=0.1
management.otlp.tracing.endpoint=${GRAFANA_OTLP_ENDPOINT:}/v1/traces
management.otlp.tracing.headers.Authorization=Basic ${GRAFANA_OTLP_TOKEN:}

# --- Metrics OTLP push (→ Grafana Cloud Prometheus/Mimir) ---
management.otlp.metrics.export.url=${GRAFANA_OTLP_ENDPOINT:}/v1/metrics
management.otlp.metrics.export.headers.Authorization=Basic ${GRAFANA_OTLP_TOKEN:}
management.otlp.metrics.export.step=30s

# --- Logs: JSON stdout (ECS → CloudWatch → Grafana Cloud CloudWatch datasource) ---
