# Test Profile Configuration
spring.datasource.url=jdbc:h2:mem:consulta_facil_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true
spring.flyway.clean-disabled=false

# Logging
logging.level.root=INFO
logging.level.com.example.consulta=INFO

# JWT
jwt.secret=test-secret-key-that-is-long-enough-for-hs512-algorithm-at-least-64-characters
jwt.expiration=3600000
