# Test Profile Configuration
spring.datasource.url=jdbc:h2:mem:consulta_facil_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true
spring.flyway.clean-disabled=false

# Logging
logging.level.root=INFO
logging.level.com.example.consulta=INFO

# JWT
jwt.secret=test-secret-key-that-is-long-enough-for-hs512-algorithm-at-least-64-characters
jwt.expiration=3600000

# AWS S3 (disabled in tests — S3Service is mocked where needed)
aws.region=us-east-1
aws.access-key=
aws.secret-key=
aws.s3.bucket-name=test-bucket

# MercadoPago (disabled in tests)
mercadopago.access-token=TEST-dummy-token
mercadopago.success-url=http://localhost:3000/billing/success
mercadopago.failure-url=http://localhost:3000/billing/failure
mercadopago.pending-url=http://localhost:3000/billing/pending

# Docker Compose
spring.docker.compose.enabled=false

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# CORS
cors.allowed-origins=http://localhost:3000
