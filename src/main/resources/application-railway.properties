# ─── Railway deployment profile ──────────────────────────────────────────────
# SPRING_PROFILES_ACTIVE=railway
# Railway injects DB_URL, DB_USERNAME, DB_PASSWORD for PostgreSQL
# and Redis vars (REDIS_URL) automatically from linked plugins.
# ─────────────────────────────────────────────────────────────────────────────

# --- Server (use Railway's dynamic PORT) ---
server.port=${PORT:8080}

# --- Database ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# HikariCP (Railway free tier resource constraints)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- Flyway ---
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=false
spring.flyway.locations=classpath:db/migration,classpath:db/migration-prod
# Railway doesn't separate DDL/DML users — use same creds
spring.flyway.user=${DB_USERNAME}
spring.flyway.password=${DB_PASSWORD}

# --- Redis (Railway Redis plugin) ---
# Railway injects REDIS_URL as redis://default:pass@host:port
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# --- JWT ---
jwt.secret=${JWT_SECRET}

# --- CORS ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# --- AWS S3 + SES (mantidos na AWS — always-free tier) ---
aws.region=${AWS_REGION}
aws.access-key=${AWS_ACCESS_KEY_ID}
aws.secret-key=${AWS_SECRET_ACCESS_KEY}
aws.s3.bucket-name=${AWS_S3_BUCKET}
aws.ses.from-email=${AWS_SES_FROM_EMAIL}

# --- App URL ---
app.url=${APP_URL}

# --- MercadoPago ---
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
mercadopago.success-url=${APP_URL}/settings/billing/success
mercadopago.failure-url=${APP_URL}/settings/billing/failure
mercadopago.pending-url=${APP_URL}/settings/billing/pending

# --- RabbitMQ (Railway RabbitMQ plugin ou CloudAMQP) ---
spring.rabbitmq.addresses=${RABBITMQ_URL:amqp://guest:guest@localhost:5672}
spring.rabbitmq.listener.simple.missing-queues-fatal=false

# --- Logging ---
logging.level.root=WARN
logging.level.com.consultafacil=INFO
logging.level.org.flywaydb=INFO
logging.level.org.springframework.security=WARN

# --- Swagger desabilitado em prod ---
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# --- Actuator ---
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.observations.key-values.application=${spring.application.name}
management.observations.key-values.environment=railway

# --- Tracing desabilitado (sem Grafana no Railway free tier) ---
management.tracing.enabled=false
