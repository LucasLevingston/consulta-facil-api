spring.datasource.url=jdbc:h2:mem:consulta_facil_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true

# Cache — disable in tests to avoid Redis dependency
spring.cache.type=none

# Disable RabbitMQ auto-configuration in tests (no broker available)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.amqp.RabbitHealthContributorAutoConfiguration

# Rate limiting — high limits in tests to avoid interference
auth.rate-limit.login.requests-per-minute=10000
auth.rate-limit.forgot-password.requests-per-15min=10000
auth.lockout.max-attempts=10000
auth.lockout.duration-minutes=0
