name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: '[0/4] Verificar estrutura dos arquivos (SOLID)'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -n "$BASE_SHA" ] && git cat-file -e "$BASE_SHA" 2>/dev/null; then
            FILES=$(git diff --name-only --diff-filter=ACM "$BASE_SHA" "${{ github.sha }}" -- '*.java')
          else
            FILES=$(find src/main -name "*.java")
          fi

          MAX_LINES=300
          FOUND=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            content=$(cat "$file" 2>/dev/null)

            lines=$(printf '%s\n' "$content" | wc -l)
            if [ "$lines" -gt "$MAX_LINES" ]; then
              echo "BLOCKED [TAMANHO] $file ($lines > $MAX_LINES linhas)"
              FOUND=1
            fi

            case "$file" in *Constants.java) ;; *)
              n=$(printf '%s\n' "$content" | grep -cE "public static final [A-Z]" || true)
              if [ "$n" -gt 0 ]; then
                echo "BLOCKED [CONSTANTS] $file — $n constante(s) estática(s) inline"
                FOUND=1
              fi ;;
            esac

            case "$file" in *Utils.java|*Helper.java|*Util.java) ;; *)
              n=$(printf '%s\n' "$content" | grep -E "private static [a-zA-Z]" | grep -vc "static final" || true)
              if [ "$n" -gt 2 ]; then
                echo "BLOCKED [FUNCTIONS] $file — $n métodos static privados em classe de negócio"
                FOUND=1
              fi ;;
            esac

            case "$file" in
              *Controller.java|*Config.java|*Policy.java|*Constants.java|*Properties.java|*Test.java) ;;
              */domain/entity/*|*/api/dto/*|src/test/*) ;;
              *)
                if printf '%s\n' "$content" | grep -qE "^(public )?(abstract )?(final )?class "; then
                  className=$(basename "$file" .java)
                  n=$(printf '%s\n' "$content" | grep -E "^    public " | grep -E "\{$" | grep -vc "$className(" || true)
                  if [ "$n" -gt 1 ]; then
                    echo "BLOCKED [SRP] $file — $n métodos públicos (máx 1 por arquivo)"
                    FOUND=1
                  fi
                fi ;;
            esac
          done <<< "$FILES"

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "SOLID violations found. Fix before merging."
            exit 1
          fi
          echo "✓ Estrutura OK"

      - name: '[1/4] Compilar'
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: '[2/4] Rodar testes'
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: '[3/4] Verificar cobertura (mínimo 30%)'
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      - name: '[4/4] Build'
        run: ./gradlew build -x test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test/
          retention-days: 7
