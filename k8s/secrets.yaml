# IMPORTANT: Replace all <base64-encoded-value> placeholders before applying.
# Generate: echo -n 'actual-value' | base64
#
# Recommended: use Sealed Secrets or External Secrets Operator instead of
# storing plaintext base64 values in source control.
apiVersion: v1
kind: Secret
metadata:
  name: consulta-facil-secrets
  namespace: consulta-facil
type: Opaque
data:
  # echo -n 'your-jwt-secret-min-32-chars' | base64
  JWT_SECRET: <base64-encoded-value>

  # echo -n 'jdbc:postgresql://host:5432/consulta_facil_db' | base64
  DB_URL: <base64-encoded-value>

  # echo -n 'cfadmin' | base64
  DB_USERNAME: <base64-encoded-value>

  # echo -n 'your-db-password' | base64
  DB_PASSWORD: <base64-encoded-value>

  # MercadoPago
  MERCADOPAGO_ACCESS_TOKEN: <base64-encoded-value>
  MERCADOPAGO_WEBHOOK_SECRET: <base64-encoded-value>

  # Grafana Cloud OTLP
  GRAFANA_OTLP_ENDPOINT: <base64-encoded-value>
  GRAFANA_OTLP_TOKEN: <base64-encoded-value>

  # Optional integrations (leave as empty string base64 = "")
  ANTHROPIC_API_KEY: <base64-encoded-value>
  TWILIO_ACCOUNT_SID: <base64-encoded-value>
  TWILIO_AUTH_TOKEN: <base64-encoded-value>
  NEXT_PUBLIC_GRAFANA_FARO_URL: <base64-encoded-value>
